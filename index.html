}

function svg(w,h){return `<svg viewBox="0 0 ${w} ${h}" width="100%" style="max-width:${w}px;font-size:11px">`;}
function txt(x,y,s,o){o=o||{};return `<text x="${x}" y="${y}" fill="${o.fill||css('--muted')}" text-anchor="${o.a||'start'}" font-size="${o.fs||11}" font-weight="${o.fw||400}">${s}</text>`;}
function ln(x1,y1,x2,y2,c,w){return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${c}" stroke-width="${w||1}"/>`;}
const EN=()=>S.lang==='en';

// ===== VIEW 1: community curve =====
function viewCommunity(){
  const thrSel=S._thr||3;
  const sc=inScope();
  const W=720,H=300,padL=44,padR=14,padT=14,padB=46,iw=W-padL-padR,ih=H-padT-padB;
  let series=YEARS.map(y=>{
    let denom=0,counts=Array(12).fill(0);
    sc.forEach(i=>{const o=i.obs[y]; if(!o)return; const a=o[S.phase]; if(a.some(v=>v!=null)){denom++; a.forEach((v,m)=>{if(v!=null&&v>=thrSel)counts[m]++;});}});
    return {y,denom,pct:counts.map(c=>denom?100*c/denom:null)};
  });
  function X(m){return padL+iw*(m/11);}
  function Y(p){return padT+ih*(1-p/100);}
  let s=svg(W,H);
  for(let g=0;g<=100;g+=25){s+=ln(padL,Y(g),W-padR,Y(g),css('--line'),1)+txt(padL-6,Y(g)+3,g+"%",{a:"end"});}
  MONTHS.forEach((m,idx)=>{s+=txt(X(idx),H-padB+16,m,{a:"middle"});});
  s+=txt(padL,H-padB+34,t('month'),{a:"start",fill:css('--muted')});
  series.forEach(se=>{
    if(se.denom===0)return;
    let path=""; se.pct.forEach((p,m)=>{if(p==null)return; path+=(path?"L":"M")+X(m)+" "+Y(p);});
    s+=`<path d="${path}" fill="none" stroke="${YCOL[se.y]}" stroke-width="2.2" stroke-linejoin="round"/>`;
    se.pct.forEach((p,m)=>{if(p!=null)s+=`<circle cx="${X(m)}" cy="${Y(p)}" r="2.6" fill="${YCOL[se.y]}"/>`;});
  });
  s+="</svg>";
  const lab=phLabs(S.phase), Xn=thrSel===3?lab[2]:lab[1];
  const desc=EN()
    ? `Share of in-scope individuals reaching “${Xn}” ${thrSel===3?'(state 3)':'or above (state ≥2)'} each month — 5 years overlaid; reads seasonal rhythm + inter-annual onset shift.`
    : `範圍內各月「達『${Xn}』${thrSel===3?'(狀態3)':'以上(狀態≥2)'}」的個體比例,5 年疊圖。看整體季節節律與年際位移(各月物候能量 + 起始月位移)。`;
  let leg='<div class="legend">'+YEARS.map(y=>`<span class="swatch"><i style="background:${YCOL[y]}"></i>${y}</span>`).join("")+`</div>`;
  return `<div class="card panel">
    <h2>${t('tabCommunity')} · ${phName(S.phase)}</h2>
    <div class="desc">${desc}</div>
    <div class="seg" style="max-width:340px;margin-bottom:8px">
      <button onclick="window._setThr(3)" class="${thrSel===3?'on':''}">${lab[2]} (3)</button>
      <button onclick="window._setThr(2)" class="${thrSel===2?'on':''}">${lab[1]} (≥2)</button>
    </div>
    <div class="scroll">${s}</div>${leg}
  </div>`;
}

// ===== VIEW 2: taxon year trend (ribbon) =====
function activeMonths(inds,year,phase,thr){
  let counts=Array(12).fill(0),denom=0;
  inds.forEach(i=>{const o=i.obs[year]; if(!o)return; const a=o[phase]; if(a.some(v=>v!=null)){denom++;a.forEach((v,m)=>{if(v!=null&&v>=thr)counts[m]++;});}});
  return {counts,denom};
}
function viewTaxon(){
  const sc=inScope(), lab=phLabs(S.phase);
  const W=720,padL=54,padR=84,rowH=30,padT=20,iw=W-padL-padR;
  const H=padT+YEARS.length*rowH+34;
  function X(m){return padL+iw*(m/11);}
  let s=svg(W,H);
  MONTHS.forEach((m,idx)=>{s+=txt(X(idx),padT-6,m,{a:"middle"});});
  YEARS.forEach((y,r)=>{
    const cy=padT+r*rowH+rowH/2;
    s+=txt(padL-10,cy+4,y,{a:"end",fill:css('--ink'),fw:600});
    const am=activeMonths(sc,y,S.phase,2), peak=activeMonths(sc,y,S.phase,3);
    if(am.denom===0){s+=txt(padL,cy+4,EN()?"(no obs)":"（無觀測）",{fill:css('--muted'),fs:11});return;}
    let mon=am.counts.map((c,m)=>c>0?m:-1).filter(m=>m>=0);
    if(mon.length){const a=Math.min(...mon),b=Math.max(...mon);
      s+=`<rect x="${X(a)}" y="${cy-7}" width="${Math.max(4,X(b)-X(a))}" height="14" rx="7" fill="${css(PHASE[S.phase].cols[1])}" opacity="0.55"/>`;
      peak.counts.forEach((c,m)=>{if(c>0){const pc=peak.denom?c/peak.denom:0;s+=`<circle cx="${X(m)}" cy="${cy}" r="${3+5*pc}" fill="${css(PHASE[S.phase].cols[2])}"/>`;}});
      s+=txt(W-padR+8,cy+4,EN()?`Mon ${a+1}–${b+1}`:`第 ${a+1}–${b+1} 月`,{fill:css('--muted'),fs:11});
    } else { s+=txt(padL,cy+4,EN()?"(none reached)":"（該年無達標）",{fill:css('--muted'),fs:11}); }
  });
  s+="</svg>";
  const desc=EN()
    ? `Active span & peak of the selected taxon each year — onset shift & phenophase duration. Switch the taxonomy level on the left to roll up to genus / family.`
    : `所選分類(科/屬/物種)在各年的${phName(S.phase)}活躍區間與盛期,逐年堆疊。看起始月位移與物候期長短;在左側切換分類層級即可上捲到屬、科。`;
  let leg=`<div class="legend"><span class="swatch"><i style="background:${css(PHASE[S.phase].cols[1])};opacity:.55"></i>${EN()?`Active (≥ ${lab[1]})`:`活躍期（${lab[1]}以上）`}</span><span class="swatch"><i style="background:${css(PHASE[S.phase].cols[2])};border-radius:50%"></i>${EN()?`Peak (${lab[2]}; larger = higher %)`:`盛期（${lab[2]};點越大=比例越高）`}</span></div>`;
  return `<div class="card panel">
    <h2>${t('tabTaxon')} · ${scopeTitle()} · ${phName(S.phase)}</h2>
    <div class="desc">${desc}</div>
    <div class="scroll">${s}</div>${leg}
    <div class="statbar" style="margin-top:10px">${EN()?`${sc.length} individuals`:`涵蓋個體 <b>${sc.length}</b> 株`}</div>
  </div>`;
}

// ===== VIEW 3: cross-species sequence =====
function viewSequence(){
  const yr=S._seqYear||YEARS[YEARS.length-1], lab=phLabs(S.phase);
  const sc=inScope().filter(i=>i.obs[yr]&&i.obs[yr][S.phase].some(v=>v!=null));
  let rows=sc.map(i=>{const a=i.obs[yr][S.phase];let best=-1,bm=null;a.forEach((v,m)=>{if(v!=null&&v>best){best=v;bm=m;}});
    let mon=a.map((v,m)=>v!=null&&v>=2?m:-1).filter(m=>m>=0);
    return {i,peak:bm,best,first:mon.length?Math.min(...mon):bm,last:mon.length?Math.max(...mon):bm};}).filter(r=>r.peak!=null&&r.best>=2);
  rows.sort((x,y)=>(x.first-y.first)||(x.peak-y.peak));
  if(!rows.length) return `<div class="card panel"><h2>${t('tabSequence')} · ${phName(S.phase)}</h2>${seqYearSeg(yr)}<div class="empty">${EN()?`No individuals reached “${lab[1]}” or above for this scope/year. Try another phenophase or year, or relax the filters.`:`此範圍/年份沒有達『${lab[1]}』以上的個體。試試切換物候相或年份,或放寬篩選。`}</div></div>`;
  const W=720,padL=EN()?184:150,padR=60,padT=18,rh=15,iw=W-padL-padR, LIM=EN()?27:16;
  const H=padT+rows.length*rh+30;
  function X(m){return padL+iw*(m/11);}
  let s=svg(W,H);
  MONTHS.forEach((m,idx)=>{s+=txt(X(idx),padT-4,m,{a:"middle"});s+=ln(X(idx),padT,X(idx),H-26,css('--line'),1);});
  rows.forEach((r,k)=>{const cy=padT+k*rh+rh/2;
    const nm=(EN()?(r.i.sci||r.i.name.split("\n")[0]):r.i.name.split("\n")[0])+" · "+famDisp(r.i);
    s+=txt(padL-8,cy+3,nm.length>LIM?nm.slice(0,LIM)+"…":nm,{a:"end",fs:10,fill:css('--ink')});
    s+=`<rect x="${X(r.first)}" y="${cy-4}" width="${Math.max(3,X(r.last)-X(r.first))}" height="8" rx="4" fill="${css(PHASE[S.phase].cols[1])}" opacity=".5"/>`;
    s+=`<circle cx="${X(r.peak)}" cy="${cy}" r="${r.best===3?4.5:3}" fill="${css(PHASE[S.phase].cols[r.best-1])}"/>`;
  });
  s+="</svg>";
  const desc=EN()
    ? `In-scope individuals ordered by ${phName(S.phase).toLowerCase()} onset month — the seasonal relay. Switch year to see whether the order shifts.`
    : `把範圍內個體依${phName(S.phase)}起始月排序,看誰先誰後的季節接力。切換年份可比較先後順序是否逐年改變。`;
  return `<div class="card panel">
    <h2>${t('tabSequence')} · ${phName(S.phase)} · ${yr}</h2>
    <div class="desc">${desc}</div>
    ${seqYearSeg(yr)}
    <div class="scroll">${s}</div>
    <div class="legend"><span class="swatch"><i style="background:${css(PHASE[S.phase].cols[1])};opacity:.5"></i>${EN()?"Active span":"活躍區間"}</span><span class="swatch"><i style="background:${css(PHASE[S.phase].cols[2])};border-radius:50%"></i>${EN()?"Peak":"盛期峰值"}</span><span>${EN()?`${rows.length} individuals`:`共 ${rows.length} 株`}</span></div>
  </div>`;
}
function seqYearSeg(yr){return `<div class="seg" style="max-width:380px;margin-bottom:8px">`+YEARS.map(y=>`<button onclick="window._setSeqYear('${y}')" class="${y===yr?'on':''}">${y}</button>`).join("")+`</div>`;}

// ===== VIEW 4: individual calendar =====
function viewIndividual(){
  if(!S.ind) return `<div class="card panel"><h2>${t('tabIndividual')}</h2><div class="empty">${EN()?'Select an individual on the left.<br><span class="muted">Narrow by family / genus / species to find it faster.</span>':'請在左側選一個個體。<br><span class="muted">先用科/屬/物種縮小範圍會更好找。</span>'}</div></div>`;
  const i=D.individuals.find(x=>x.uid===S.ind);
  if(!i) return `<div class="card panel"><div class="empty">${EN()?"Individual not found.":"找不到個體。"}</div></div>`;
  const phases=["leaf","flower","fruit"];
  const cell=26,padL=92,padT=24,W=padL+12*cell+10;
  let blocks="";
  phases.forEach((ph)=>{
    const H=padT+YEARS.length*cell+12, labs=phLabs(ph);
    let s=svg(W,H);
    MONTHS.forEach((m,idx)=>{s+=txt(padL+idx*cell+cell/2,padT-7,m,{a:"middle"});});
    YEARS.forEach((y,r)=>{const cy=padT+r*cell;
      s+=txt(padL-8,cy+cell/2+4,y,{a:"end",fw:600,fill:css('--ink')});
      const o=i.obs[y];
      for(let m=0;m<12;m++){const x=padL+m*cell;let v=o?o[ph][m]:null;
        let fill=v?css(PHASE[ph].cols[v-1]):"#fff";
        s+=`<rect x="${x+1}" y="${cy+1}" width="${cell-2}" height="${cell-2}" rx="4" fill="${fill}" stroke="${css('--line')}"/>`;
        if(v)s+=txt(x+cell/2,cy+cell/2+4,v,{a:"middle",fs:11,fill:inkOn(fill),fw:600});
      }
    });
    s+="</svg>";
    const cols=PHASE[ph].cols;
    blocks+=`<div style="margin-bottom:14px"><div style="font-weight:600;margin-bottom:4px">${phName(ph)}</div>${s}
      <div class="legend"><span class="swatch"><i style="background:${css(cols[0])}"></i>1 ${labs[0]}</span>
      <span class="swatch"><i style="background:${css(cols[1])}"></i>2 ${labs[1]}</span>
      <span class="swatch"><i style="background:${css(cols[2])}"></i>3 ${labs[2]}</span></div></div>`;
  });
  const oy=(i.obs_years||[]).join(EN()?", ":"、")||"—";
  const statbar=EN()
    ? `<span>Scientific name <b><i>${i.sci||"—"}</i></b></span><span>Family <b>${i.fam_sci||i.fam||"—"}</b></span><span>Genus <b>${i.gen_sci||i.gen||"—"}</b></span><span>Chinese name <b>${i.zh||"—"}</b></span><span>Growth form <b>${formLabel(i.form)}</b></span><span>Trail side <b>${i.side||"—"}</b></span><span>Observed yrs <b>${oy}</b></span><span>${t('consStatus')} <b>${consStr(i)}</b></span>`
    : `<span>名錄正名 <b>${i.zh||"—"}</b></span><span>科 <b>${i.fam||"—"}</b></span><span>屬 <b>${i.gen||"—"}</b></span><span>學名 <b><i>${i.sci||"—"}</i></b></span><span>形相 <b>${formLabel(i.form)}</b></span><span>步道側 <b>${i.side||"—"}</b></span><span>有觀測年 <b>${oy}</b></span><span>${t('consStatus')} <b>${consStr(i)}</b></span>`;
  return `<div class="card panel">
    <h2>${i.uid} · ${indName(i)}</h2>
    ${badges(i)}
    <div class="statbar">${statbar}</div>
    ${blocks}
    ${i.note?`<div class="note">${t('note')}：${i.note.replace(/\n/g,"  ")}</div>`:""}
  </div>`;
}

// ---- render dispatch ----
function render(){
  buildFilters();
  document.querySelectorAll("#phaseSeg button").forEach(b=>b.classList.toggle("on",b.dataset.p===S.phase));
  document.querySelectorAll("#tabs button").forEach(b=>b.classList.toggle("on",b.dataset.t===S.tab));
  const v=document.getElementById("view");
  if(S.tab==="community")v.innerHTML=viewCommunity();
  else if(S.tab==="taxon")v.innerHTML=viewTaxon();
  else if(S.tab==="sequence")v.innerHTML=viewSequence();
  else v.innerHTML=viewIndividual();
}
function applyLang(){
  document.documentElement.lang=EN()?"en":"zh-Hant";
  document.querySelectorAll("[data-i18n]").forEach(el=>{el.textContent=t(el.getAttribute("data-i18n"));});
  document.querySelectorAll("[data-i18n-html]").forEach(el=>{el.innerHTML=t(el.getAttribute("data-i18n-html"));});
  document.querySelectorAll("#langSeg button").forEach(b=>b.classList.toggle("on",b.dataset.l===S.lang));
  render();
}
window._setThr=x=>{S._thr=x;render();};
window._setSeqYear=y=>{S._seqYear=y;render();};

// ---- events ----
document.querySelectorAll("#langSeg button").forEach(b=>b.onclick=()=>{S.lang=b.dataset.l;applyLang();});
document.querySelectorAll("#phaseSeg button").forEach(b=>b.onclick=()=>{S.phase=b.dataset.p;render();});
document.querySelectorAll("#tabs button").forEach(b=>b.onclick=()=>{S.tab=b.dataset.t;render();});
selFam.onchange=e=>{S.fam=e.target.value;S.gen="";S.sp="";S.ind="";render();};
selGen.onchange=e=>{S.gen=e.target.value;S.sp="";S.ind="";render();};
selSp.onchange=e=>{S.sp=e.target.value;S.ind="";render();};
selInd.onchange=e=>{S.ind=e.target.value;if(S.ind)S.tab="individual";render();};
onlyObs.onchange=e=>{S.onlyObs=e.target.checked;render();};
onlyEndemic.onchange=e=>{S.endemic=e.target.checked;render();};
selCons.onchange=e=>{S.cons=e.target.value;render();};
reset.onclick=()=>{S.fam=S.gen=S.sp=S.ind="";S.endemic=false;S.cons="";onlyEndemic.checked=false;render();};
applyLang();
})();
</script>
