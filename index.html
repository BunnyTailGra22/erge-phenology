    </div>
    ${blocks}
    ${i.note?`<div class="note">備註：${i.note.replace(/\n/g,"  ")}</div>`:""}
  </div>`;
}

// ---- render dispatch ----
function render(){
  buildFilters();
  document.querySelectorAll("#phaseSeg button").forEach(b=>b.classList.toggle("on",b.dataset.p===S.phase));
  document.querySelectorAll("#tabs button").forEach(b=>b.classList.toggle("on",b.dataset.t===S.tab));
  const v=document.getElementById("view");
  if(S.tab==="community")v.innerHTML=viewCommunity();
  else if(S.tab==="taxon")v.innerHTML=viewTaxon();
  else if(S.tab==="sequence")v.innerHTML=viewSequence();
  else v.innerHTML=viewIndividual();
}
window._setThr=t=>{S._thr=t;render();};
window._setSeqYear=y=>{S._seqYear=y;render();};

// ---- events ----
document.querySelectorAll("#phaseSeg button").forEach(b=>b.onclick=()=>{S.phase=b.dataset.p;render();});
document.querySelectorAll("#tabs button").forEach(b=>b.onclick=()=>{S.tab=b.dataset.t;render();});
selFam.onchange=e=>{S.fam=e.target.value;S.gen="";S.sp="";S.ind="";render();};
selGen.onchange=e=>{S.gen=e.target.value;S.sp="";S.ind="";render();};
selSp.onchange=e=>{S.sp=e.target.value;S.ind="";render();};
selInd.onchange=e=>{S.ind=e.target.value;if(S.ind)S.tab="individual";render();};
onlyObs.onchange=e=>{S.onlyObs=e.target.checked;render();};
onlyEndemic.onchange=e=>{S.endemic=e.target.checked;render();};
reset.onclick=()=>{S.fam=S.gen=S.sp=S.ind="";S.endemic=false;onlyEndemic.checked=false;render();};
render();
})();
</script>
</body>
</html>
